  /items/search:
    get:
      summary: Search items
      description: Full-text search by item name, brand, or both. The requested
        language is prioritized in ranking.
      tags:
        - Items
      parameters:
        - name: q
          in: query
          required: false
          schema:
            minLength: 1
            type: string
        - name: brand
          in: query
          required: false
          schema:
            minLength: 1
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
            enum:
              - english
              - portuguese
              - spanish
              - french
        - name: limit
          in: query
          required: false
          schema:
            minimum: 1
            anyOf:
              - format: numeric
                default: 0
                type: string
              - minimum: 1
                type: number
        - name: minScore
          in: query
          required: false
          schema:
            minimum: 0
            anyOf:
              - format: numeric
                default: 0
                type: string
              - minimum: 0
                type: number
      operationId: getItemsSearch
  /items/barcode/{barcode}:
    get:
      summary: Get item by barcode
      tags:
        - Items
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            minLength: 1
            maxLength: 128
            type: string
      operationId: getItemsBarcodeByBarcode
  /items/{id}:
    get:
      summary: Get item summary
      tags:
        - Items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            format: uuid
            type: string
      operationId: getItemsById
    put:
      summary: Update item core fields
      description: Updates mutable item identity fields. Nutrition summary fields are
        managed from nutrition data.
      tags:
        - Items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                barcode:
                  minLength: 1
                  maxLength: 128
                  type: string
                name:
                  minLength: 1
                  type: string
                brand:
                  anyOf:
                    - type: string
                    - type: "null"
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                barcode:
                  minLength: 1
                  maxLength: 128
                  type: string
                name:
                  minLength: 1
                  type: string
                brand:
                  anyOf:
                    - type: string
                    - type: "null"
          multipart/form-data:
            schema:
              type: object
              properties:
