name: DB Check

on:
  pull_request:
    branches: [master]
    paths:
      - "db/**"
      - "drizzle/**"
      - "drizzle.config.*"
      - "package.json"
      - "bun.lock"
  push:
    branches: [master]
    paths:
      - "db/**"
      - "drizzle/**"
      - "drizzle.config.*"

concurrency:
  group: db-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    name: Migrate + schema drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - name: Cache bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Enable pgcrypto
        run: |
          PGPASSWORD=ci psql -h localhost -U ci -d ci -c "create extension if not exists pgcrypto;"
      - name: Apply migrations
        run: bunx drizzle-kit migrate
      - name: Detect uncommitted schema drift
        run: |
          bunx drizzle-kit generate --name=ci_drift_check
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "::error::Schema drift detected. Run 'bunx drizzle-kit generate' and commit the migration."
            git status drizzle
            git diff drizzle
            exit 1
          fi
