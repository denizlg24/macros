name: Dependabot Bun Lockfile

on:
  pull_request_target:
    branches: [master]
    paths:
      - "package.json"
      - "bun.lock"
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

env:
  BUN_VERSION: 1.2.21

jobs:
  update-lockfile:
    name: Update bun.lock
    if: >
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Regenerate Bun lockfile
        run: bun install --lockfile-only --ignore-scripts

      - name: Commit lockfile changes
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock is already up to date."
            exit 0
          fi

          git config user.name "dependabot[bot]"
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): update bun lockfile" \
            -m "- regenerate bun.lock for dependabot package updates" \
            -m "- Assisted by \"GPT-5\" & authored by \"Deniz Günes\""
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
